        const idx = Math.floor(Math.random() * PLACEHOLDER_IMAGES.length);
        e.target.src = PLACEHOLDER_IMAGES[idx];
      }
    }, true);

    // SplitText Polyfill for GSAP compatibility
    class SplitTextPolyfill {
      constructor(element, options = {}) {
        this.elements = [];
        if (typeof element === 'string') {
          this.elements = Array.from(document.querySelectorAll(element));
        } else if (element.length !== undefined && !element.nodeType) {
          this.elements = Array.from(element);
        } else if (element) {
          this.elements = [element];
        }
        
        this.options = options;
        this.type = options.type || "words,chars";
        this.chars = [];
        this.words = [];
        this.lines = [];
        this.originalContent = this.elements.map(el => ({ el, html: el.innerHTML }));
        this.split();
      }
      
      split() {
        const types = this.type.split(',').map(t => t.trim());
        const wantChars = types.includes('chars');
        const wantWords = types.includes('words');
        const wantLines = types.includes('lines');
        
        this.elements.forEach(el => {
          let text = el.textContent || "";
          el.innerHTML = "";
          
          let words = text.split(/(\s+)/).filter(w => w.length > 0);
          let wordElements = [];
          let charElements = [];
          
          words.forEach(w => {
            if (/\s+/.test(w)) {
              el.appendChild(document.createTextNode(w));
              return;
            }
            let wordSpan = document.createElement('span');
            wordSpan.style.display = 'inline-block';
            wordSpan.style.whiteSpace = 'nowrap';
            if (this.options.wordsClass) wordSpan.className = this.options.wordsClass;
            
            if (wantChars) {
              Array.from(w).forEach(c => {
                let charSpan = document.createElement('span');
                charSpan.style.display = 'inline-block';
                charSpan.textContent = c;
                if (this.options.charsClass) charSpan.className = this.options.charsClass;
                wordSpan.appendChild(charSpan);
                charElements.push(charSpan);
              });
            } else {
              wordSpan.textContent = w;
            }
            
            el.appendChild(wordSpan);
            wordElements.push(wordSpan);
          });
          
          this.chars = this.chars.concat(charElements);
          this.words = this.words.concat(wordElements);
          
          if (wantLines) {
            let currentLine = [];
            let lastTop = -1;
            wordElements.forEach(span => {
              let rect = span.getBoundingClientRect();
              let top = rect.top;
              if (lastTop === -1) {
                lastTop = top;
                currentLine.push(span);
              } else if (Math.abs(top - lastTop) > 6) {
                let lineSpan = document.createElement('span');
                lineSpan.style.display = 'block';
                if (this.options.linesClass) lineSpan.className = this.options.linesClass;
                currentLine.forEach(w => {
                  if (w.parentNode) w.parentNode.insertBefore(lineSpan, w);
                  lineSpan.appendChild(w);
                });
                this.lines.push(lineSpan);
                currentLine = [span];
                lastTop = top;
              } else {
                currentLine.push(span);
              }
            });
            if (currentLine.length > 0) {
              let lineSpan = document.createElement('span');
              lineSpan.style.display = 'block';
              if (this.options.linesClass) lineSpan.className = this.options.linesClass;
              currentLine.forEach(w => {
                if (w.parentNode) w.parentNode.insertBefore(lineSpan, w);
                lineSpan.appendChild(w);
              });
              this.lines.push(lineSpan);
            }
          }
        });
      }
      
      revert() {
        this.originalContent.forEach(item => {
          item.el.innerHTML = item.html;
        });
      }
    }
    window.SplitText = SplitTextPolyfill;
    window.SplitType = SplitTextPolyfill;

    window.ScrollSmoother = {

          kill: () => lenis.destroy()

      gsap.registerPlugin({ name: "morphSVG", init() { return true; } });
      gsap.registerPlugin({ name: "scrambleText", init() { return true; } });
    }
  </script>

<body>

   <!-- Each gallery is 120vh tall with its own background photo
        AND its own vignette (fixed-position card that follows
        the cursor with spring smoothing).  Because the section
        applies clip-path: inset(0), the vignette is only visible
        WHILE that section is on screen — when you scroll, the
        next section's vignette takes over. -->

   <section class="gallery">
      <div class="gallery__bg">
         <img src="./img/dyal_thak/background.jpg" alt="" />
      </div>
      <div class="vignette" data-vignette>
         <img src="./img/dyal_thak/1.jpg" alt="" />
      </div>
   </section>

   <section class="gallery">
      <div class="gallery__bg">
         <img src="./img/leidinger_matthias/background.jpg" alt="" />
      </div>
      <div class="vignette" data-vignette>
         <img src="./img/leidinger_matthias/1.jpg" alt="" />
      </div>
   </section>

   <section class="gallery">
      <div class="gallery__bg">
         <img src="./img/mark_rammers/background.jpg" alt="" />
      </div>
      <div class="vignette" data-vignette>
         <img src="./img/mark_rammers/1.jpg" alt="" />
      </div>
   </section>

   <section class="gallery">
      <div class="gallery__bg">
         <img src="./img/landon_speers/background.jpg" alt="" />
      </div>
      <div class="vignette" data-vignette>
         <img src="./img/landon_speers/1.jpg" alt="" />
      </div>
   </section>

   <!-- DESCRIPTION — 4 text rows, hover swaps the about image -->
   <section class="description">
      <div class="description__list" id="js-desc-list">
         <p data-handle="dyal_thak"          data-i="0">Dyal Thak</p>
         <p data-handle="leidinger_matthias" data-i="1">Leidinger Matthias</p>
         <p data-handle="mark_rammers"       data-i="2">Mark Rammers</p>
         <p data-handle="landon_speers"      data-i="3">Landon Speers</p>
      </div>

      <div class="vignette" data-vignette>
         <!-- Stack all about.jpg images, fade in the active one.
              Avoids src swap → no flash. -->
         <img src="./img/dyal_thak/about.jpg"          data-i="0" class="is-active" alt="" />
         <img src="./img/leidinger_matthias/about.jpg" data-i="1"                   alt="" />
         <img src="./img/mark_rammers/about.jpg"       data-i="2"                   alt="" />
         <img src="./img/landon_speers/about.jpg"      data-i="3"                   alt="" />
      </div>
   </section>
